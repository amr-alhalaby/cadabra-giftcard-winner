services:
  postgres:
    image: postgres:16-alpine
    container_name: cadabra-postgres
    environment:
      POSTGRES_DB: cadabra
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cadabra-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cadabra"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: cadabra-giftcard-winner
    container_name: cadabra-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cadabra
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    volumes:
      - ./data:/app/data   # mount local data/ folder into container
    command: "purchases.csv.path=/app/data/${CSV_FILE:-purchases-external.csv}"

volumes:
  cadabra-pgdata:
