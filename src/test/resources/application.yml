spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

user:
  chunk-size: 10

csv:
  purchases:
    default-path: data/test-purchases.csv
    columns: userId,amount
    delimiter: ","
    lines-to-skip: 1
    max-skip-lines: 10
    chunk-size: 10

winner:
  min-purchase-amount: 20

integration:
  user-api:
    url: http://localhost:8089/users
