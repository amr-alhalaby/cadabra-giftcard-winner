spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

csv:
  purchases:
    default-path: data/test-purchases.csv
    columns: userId,amount
    delimiter: ","
    lines-to-skip: 1
    max-skip-lines: 10
    chunk-size: 10

winner:
  min-purchase-amount: 20

integration:
  user-api:
    url: http://localhost:8089/users

